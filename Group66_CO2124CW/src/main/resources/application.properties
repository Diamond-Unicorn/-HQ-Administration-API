spring.application.name=Group66_CO2124CW

# SSL Settings
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=password123
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=hqadmin

# MySQL Connection
spring.datasource.url=jdbc:mysql://localhost:3306/hqadmin_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=hqadmin_user
spring.datasource.password=password123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialect updated for Hibernate 6 compatibility:
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

#jsp support
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

server.servlet.session.cookie.http-only=true
# Since you are on 8443 (HTTPS), set this to true
server.servlet.session.cookie.secure=true
server.servlet.session.timeout=30m
